name: Run Optimization

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      n_runs:
        description: "Number of runs per benchmark"
        required: false
        default: "30"
      max_evals:
        description: "Max evaluations per run"
        required: false
        default: "15000"

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run experiment
        run: |
          sed -i "s/^N_RUNS = .*/N_RUNS = ${{ github.event.inputs.n_runs || '30' }}/" main.py
          sed -i "s/^MAX_EVALS = .*/MAX_EVALS = ${{ github.event.inputs.max_evals || '15000' }}/" main.py
          python main.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
          retention-days: 30
